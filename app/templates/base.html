<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - CRM Platform</title>
    <!-- Use Tailwind CSS via CDN for simple, rapid, and clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item-active {
            background-color: #374151;
            color: white;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 font-sans leading-normal tracking-normal">

    <!-- Sidebar -->
    <div class="bg-gray-900 shadow-xl h-screen w-64 fixed left-0 top-0 overflow-y-auto z-30">
        <div class="px-6 py-6 border-b border-gray-800 flex items-center">
            <i class="fas fa-cube text-blue-500 text-2xl mr-3"></i>
            <h1 class="text-white text-xl font-bold tracking-tight">CRM Cloud</h1>
        </div>
        <nav class="mt-4">
            <a class="flex items-center py-3 px-6 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors {% if title == 'Dashboard' %}sidebar-item-active{% endif %}"
                href="/">
                <i class="fas fa-chart-line w-5 mr-3"></i> Dashboard
            </a>
            <a class="flex items-center py-3 px-6 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors {% if title == 'Leads' %}sidebar-item-active{% endif %}"
                href="/leads">
                <i class="fas fa-user-plus w-5 mr-3"></i> Leads
            </a>
            <a class="flex items-center py-3 px-6 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors {% if title == 'Contacts' %}sidebar-item-active{% endif %}"
                href="/contacts">
                <i class="fas fa-address-book w-5 mr-3"></i> Contacts
            </a>
            <a class="flex items-center py-3 px-6 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors {% if title == 'Accounts' %}sidebar-item-active{% endif %}"
                href="/accounts">
                <i class="fas fa-building w-5 mr-3"></i> Accounts
            </a>
            <a class="flex items-center py-3 px-6 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors {% if title == 'Deals' %}sidebar-item-active{% endif %}"
                href="/deals">
                <i class="fas fa-handshake w-5 mr-3"></i> Deals
            </a>
            <a class="flex items-center py-3 px-6 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors {% if title == 'Activities' %}sidebar-item-active{% endif %}"
                href="/activities">
                <i class="fas fa-tasks w-5 mr-3"></i> Activities
            </a>

            <div class="mt-10 px-6 border-t border-gray-800 pt-6">
                <a href="/logout"
                    class="flex items-center justify-center w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-2 px-4 rounded transition-all text-sm font-bold">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content Wrapper -->
    <div class="ml-64 flex flex-col min-h-screen">
        <!-- Top Bar -->
        <header class="bg-white border-b h-16 flex items-center justify-between px-8 sticky top-0 z-20">
            <div class="flex-1 max-w-xl">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Search records..."
                        class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-md leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all">
                </div>
            </div>
            <div class="flex items-center space-x-6 text-gray-500">
                <button class="hover:text-blue-600 transition-colors"><i class="fas fa-bell text-lg"></i></button>
                <button class="hover:text-blue-600 transition-colors"><i
                        class="fas fa-calendar-alt text-lg"></i></button>
                <button class="hover:text-blue-600 transition-colors"><i class="fas fa-cog text-lg"></i></button>
                <div
                    class="h-8 w-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm">
                    {{ user.email[0].upper() if user else 'U' }}
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 p-8">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    {% block scripts %}
    {% endblock %}

</body>

</html>
