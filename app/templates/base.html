<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - CRM Platform</title>
    <!-- Use Tailwind CSS via CDN for simple, rapid, and clean styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body class="bg-gray-100 text-gray-800 font-sans leading-normal tracking-normal flex">

    <!-- Sidebar -->
    <div class="bg-gray-800 shadow-xl h-screen w-64 fixed left-0 top-0 overflow-y-auto z-20">
        <div class="px-6 py-4 border-b border-gray-700">
            <h1 class="text-white text-2xl font-semibold">CRM Platform</h1>
        </div>
        <nav class="mt-6">
            <a class="flex items-center mt-4 py-2 px-6 text-gray-100 hover:bg-gray-700 hover:text-white" href="/">
                Dashboard
            </a>
            <a class="flex items-center mt-4 py-2 px-6 text-gray-400 hover:bg-gray-700 hover:text-white" href="/leads">
                Leads
            </a>
            <a class="flex items-center mt-4 py-2 px-6 text-gray-400 hover:bg-gray-700 hover:text-white" href="/contacts">
                Contacts
            </a>
            <a class="flex items-center mt-4 py-2 px-6 text-gray-400 hover:bg-gray-700 hover:text-white" href="/deals">
                Deals
            </a>
            <a class="flex items-center mt-4 py-2 px-6 text-gray-400 hover:bg-gray-700 hover:text-white" href="/activities">
                Activities
            </a>
            <div class="mt-10 px-6">
                <a href="/logout" class="block w-full text-center mt-4 bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded">
                  Logout
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 ml-64 p-8 min-h-screen">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
