{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Summary Cards -->
    <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-gray-500 text-sm font-semibold uppercase">Total Leads</h3>
        <p class="text-3xl font-bold text-blue-600 mt-2">{{ lead_count }}</p>
    </div>
    <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-gray-500 text-sm font-semibold uppercase">Active Deals</h3>
        <p class="text-3xl font-bold text-green-600 mt-2">{{ deal_count }}</p>
    </div>
    <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-gray-500 text-sm font-semibold uppercase">Tasks Due</h3>
        <p class="text-3xl font-bold text-red-600 mt-2">{{ task_count }}</p>
    </div>
</div>
{% endblock %}
